<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do you love me?</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
    }

    h1 {
        color: #ff6b6b;
        font-size: 40px;
        margin-bottom: 20px;
    }

    img {
        width: 200px;
        margin-bottom: 20px;
    }

    button {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 20px;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4c4c;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Do you love me?</h1>

    <!-- Replace with your image -->
    <img src="https://media.tenor.com/kpNv8nmAmWsAAAAj/tontonfriends-chubby.gif" alt="cute dog">

    <br>
    <button onclick="showLove()">Yes</button>
    <button onclick="showLove()">No</button>
</div>

<script>
function showLove() {
    alert("I love you too ❤️");
}
</script>

</body>
</html>
